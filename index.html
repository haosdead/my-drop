<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL ELITE | Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;800&display=swap');

        :root { --bg: #0a0a0a; --card: #151515; --accent: #ff6600; --text: #ffffff; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Шапка */
        header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100;
        }
        .menu-toggle { font-size: 24px; color: var(--accent); cursor: pointer; }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); letter-spacing: 2px; }

        /* Викатне меню (Sidebar) */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: #111; border-right: 1px solid var(--accent);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 20px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        #sidebar.active { left: 0; }
        .sidebar-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); 
            display:none; z-index: 999; 
        }

        .cat-item { 
            padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222;
            cursor: pointer; transition: 0.3s; font-weight: 500;
        }
        .cat-item:hover, .cat-item.active { background: var(--accent); color: #000; font-weight: 800; border-color: var(--accent); }

        /* Пошук */
        .search-container { padding: 15px; }
        #search { 
            width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #333; 
            background: #1a1a1a; color: white; outline: none; box-sizing: border-box;
        }

        /* Картки товарів */
        .catalog { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; 
        }
        @media (min-width: 1024px) { .catalog { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); } }

        .card { 
            background: var(--card); border-radius: 25px; overflow: hidden; 
            border: 1px solid #222; transition: 0.3s; position: relative;
        }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-sku { font-size: 10px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        .card-title { font-size: 14px; font-weight: 500; height: 34px; overflow: hidden; margin-bottom: 10px; }
        .card-price { font-size: 20px; font-weight: 800; color: var(--accent); }

        /* Модалка на весь екран */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 2000; overflow-y: auto; 
        }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; font-family: 'Orbitron'; }
        .modal-content { padding: 0 20px 120px 20px; }
        .modal-img { width: 100%; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-price { font-size: 32px; font-weight: 800; color: var(--accent); margin: 20px 0; }
        
        /* Кнопки замовлення */
        .order-panel { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: rgba(10,10,10,0.9); border-top: 1px solid #333;
            display: flex; gap: 10px; box-sizing: border-box;
        }
        .btn { 
            flex: 1; padding: 18px; border-radius: 20px; text-decoration: none; 
            text-align: center; font-weight: 800; font-size: 14px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div class="logo" style="margin-bottom: 30px;">КАТЕГОРІЇ</div>
    <div id="filters"></div>
</div>

<header>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></div>
    <div class="logo">TACTICAL ELITE</div>
    <div><i class="fa-solid fa-cart-shopping" style="opacity:0.3"></i></div>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Пошук спорядження за назвою або ART..." oninput="handleSearch()">
</div>

<div class="catalog" id="catalog"></div>
<button id="loadMore" style="display:none; width:90%; margin:20px 5%; padding:18px; background:none; border:2px solid var(--accent); color:var(--accent); border-radius:20px; font-weight:bold;" onclick="loadMore()">ПОКАЗАТИ ЩЕ</button>

<div id="modal">
    <div class="modal-header">
        <span id="m-sku" style="color:var(--accent)"></span>
        <span onclick="closeModal()" style="font-size:30px">&times;</span>
    </div>
    <div class="modal-content" id="m-body"></div>
    <div class="order-panel" id="m-footer"></div>
</div>

<script>
    let products = [];
    let filtered = [];
    let limit = 20;
    const CONFIG = { tg: "haosdead", wa: "380XXXXXXXXX" };

    async function init() {
        const res = await fetch('products.json');
        products = await res.json();
        filtered = products;

        const cats = ['Всі', ...new Set(products.map(p => p.c))];
        document.getElementById('filters').innerHTML = cats.map(c => 
            `<div class="cat-item" onclick="filterCat('${c}', this)">${c}</div>`).join('');
        
        render();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.querySelector('.sidebar-overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function render() {
        const container = document.getElementById('catalog');
        const items = filtered.slice(0, limit);
        container.innerHTML = items.map(p => `
            <div class="card" onclick="openModal(${products.indexOf(p)})">
                <img src="${p.i[0]}" loading="lazy">
                <div class="card-body">
                    <div class="card-sku">ART: ${p.v}</div>
                    <div class="card-title">${p.n}</div>
                    <div class="card-price">${p.p} грн</div>
                </div>
            </div>
        `).join('');
        document.getElementById('loadMore').style.display = limit < filtered.length ? 'block' : 'none';
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        filtered = (cat === 'Всі') ? products : products.filter(p => p.c === cat);
        limit = 20;
        render();
        toggleMenu();
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        filtered = products.filter(p => p.n.toLowerCase().includes(q) || String(p.v).includes(q));
        limit = 20;
        render();
    }

    function openModal(idx) {
        const p = products[idx];
        const msg = encodeURIComponent(`Замовлення ART: ${p.v}\nТовар: ${p.n}`);
        
        document.getElementById('m-sku').innerText = `ART: ${p.v}`;
        document.getElementById('m-body').innerHTML = `
            <img src="${p.i[0]}" class="modal-img">
            <div style="display:flex; gap:10px; margin:15px 0; overflow-x:auto;">
                ${p.i.map(src => `<img src="${src}" style="width:80px; height:80px; border-radius:10px; object-fit:cover;">`).join('')}
            </div>
            <div class="modal-price">${p.p} грн</div>
            <h2 style="font-family:'Orbitron'; font-size:20px;">${p.n}</h2>
            <div style="color:#aaa; line-height:1.6; margin-bottom:30px;">${p.d}</div>
        `;
        document.getElementById('m-footer').innerHTML = `
            <a href="https://t.me/${CONFIG.tg}?text=${msg}" class="btn" style="background:var(--accent); color:black">TELEGRAM</a>
            <a href="https://wa.me/${CONFIG.wa}?text=${msg}" class="btn" style="background:white; color:black">WHATSAPP</a>
        `;
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function loadMore() { limit += 20; render(); }

    init();
</script>
</body>
</html>

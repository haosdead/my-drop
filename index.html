<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Store | Каталог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #2c3e50; --price: #27ae60; --bg: #f8f9fa; --shadow: 0 4px 12px rgba(0,0,0,0.08); }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; color: #333; }

        /* Бокове меню */
        aside { width: 280px; background: white; height: 100vh; position: sticky; top: 0; border-right: 1px solid #eee; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        
        #search { padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s; }
        #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1); }

        .nav-title { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; }
        #filters { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
        .cat-btn { text-align: left; background: none; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 14px; color: #555; }
        .cat-btn:hover { background: #f0f0f0; }
        .cat-btn.active { background: var(--accent); color: white; font-weight: 600; }

        /* Основний контент */
        main { flex: 1; padding: 30px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        /* Картка товару */
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; position: relative; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.12); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-info h3 { font-size: 14px; margin: 0 0 10px 0; line-height: 1.4; height: 2.8em; overflow: hidden; font-weight: 600; }
        .price-tag { font-size: 18px; font-weight: 800; color: var(--price); }

        /* Модалка (ВАУ дизайн) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(5px); }
        .modal-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 1000px; background: white; border-radius: 24px; display: flex; overflow: hidden; max-height: 90vh; }
        
        .modal-gallery { width: 50%; background: #f9f9f9; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .main-img { width: 100%; height: 400px; object-fit: contain; border-radius: 12px; }
        .thumbs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
        .thumb.active { border-color: var(--accent); }

        .modal-details { width: 50%; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .close-btn { align-self: flex-end; font-size: 24px; cursor: pointer; border: none; background: none; margin-bottom: -30px; }
        .modal-details h2 { font-size: 24px; margin: 20px 0; }
        .modal-details .desc { font-size: 15px; line-height: 1.6; color: #666; margin-bottom: 30px; }
        
        .order-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: auto; }
        .btn-order { padding: 15px; border-radius: 12px; text-decoration: none; color: white; font-weight: 700; text-align: center; transition: 0.2s; }
        .btn-tg { background: #0088cc; }
        .btn-wa { background: #25d366; }
        .btn-order:hover { opacity: 0.9; transform: scale(1.02); }

        /* Адаптивність */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #eee; }
            .modal-container { flex-direction: column; width: 95%; }
            .modal-gallery, .modal-details { width: 100%; padding: 20px; }
            .main-img { height: 250px; }
        }
    </style>
</head>
<body>

<aside>
    <div class="logo">Tactical Shop</div>
    <input type="text" id="search" placeholder="Пошук спорядження..." oninput="resetAndRender()">
    <div class="nav-title">Категорії</div>
    <div id="filters"></div>
</aside>

<main>
    <div class="catalog" id="catalog"></div>
    <div id="pagination-trigger" style="height: 50px;"></div>
</main>

<div id="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-container">
        <div class="modal-gallery">
            <img id="main-modal-img" class="main-img" src="">
            <div id="thumbs" class="thumbs"></div>
        </div>
        <div class="modal-details">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div id="modal-cat" style="color: #999; font-size: 12px; font-weight: 700; text-transform: uppercase;"></div>
            <h2 id="modal-title"></h2>
            <div id="modal-price" class="price-tag" style="font-size: 28px; margin-bottom: 20px;"></div>
            <div id="modal-desc" class="desc"></div>
            <div class="order-actions" id="modal-links"></div>
        </div>
    </div>
</div>

<script>
    let products = [];
    let filtered = [];
    let displayCount = 20;
    const CONFIG = { tg: "haosdead", wa: "380XXXXXXXXX" };

    async function init() {
        const res = await fetch('products.json');
        products = await res.json();
        filtered = products;

        const cats = ['Всі', ...new Set(products.map(p => p.c))];
        document.getElementById('filters').innerHTML = cats.map(c => 
            `<button class="cat-btn ${c==='Всі'?'active':''}" onclick="filterCat('${c}', this)">${c}</button>`).join('');
        
        render();
    }

    function render() {
        const container = document.getElementById('catalog');
        container.innerHTML = filtered.slice(0, displayCount).map((p, i) => `
            <div class="card" onclick="openModal(${products.indexOf(p)})">
                <img src="${p.i[0]}" loading="lazy">
                <div class="card-info">
                    <h3>${p.n}</h3>
                    <div class="price-tag">${p.p} грн</div>
                </div>
            </div>
        `).join('');
    }

    // Нескінченна прокрутка (замість кнопок)
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (displayCount < filtered.length) {
                displayCount += 20;
                render();
            }
        }
    };

    function resetAndRender() {
        const q = document.getElementById('search').value.toLowerCase();
        filtered = products.filter(p => p.n.toLowerCase().includes(q));
        displayCount = 20;
        render();
    }

    function filterCat(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filtered = (cat === 'Всі') ? products : products.filter(p => p.c === cat);
        displayCount = 20;
        render();
    }

    function openModal(idx) {
        const p = products[idx];
        const msg = encodeURIComponent(`Замовлення: ${p.n}`);
        
        document.getElementById('main-modal-img').src = p.i[0];
        document.getElementById('modal-title').innerText = p.n;
        document.getElementById('modal-price').innerText = p.p + ' грн';
        document.getElementById('modal-desc').innerHTML = p.d;
        document.getElementById('modal-cat').innerText = p.c;
        
        document.getElementById('thumbs').innerHTML = p.i.map((src, i) => `
            <img src="${src}" class="thumb ${i===0?'active':''}" onclick="changeImg('${src}', this)">
        `).join('');

        document.getElementById('modal-links').innerHTML = `
            <a href="https://t.me/${CONFIG.tg}?text=${msg}" class="btn-order btn-tg"><i class="fab fa-telegram"></i> Telegram</a>
            <a href="https://wa.me/${CONFIG.wa}?text=${msg}" class="btn-order btn-wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        `;
        
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function changeImg(src, thumb) {
        document.getElementById('main-modal-img').src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>

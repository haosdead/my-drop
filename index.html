<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Elite Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0d0d0d; --card-bg: #1a1a1a; --accent: #ff6600; --text: #e0e0e0; }
        
        body { font-family: 'Roboto Condensed', sans-serif; background: var(--bg); margin: 0; color: var(--text); }

        header { position: sticky; top: 0; background: rgba(13, 13, 13, 0.95); z-index: 100; border-bottom: 2px solid var(--accent); padding: 15px; backdrop-filter: blur(10px); }
        .logo { font-weight: 900; font-size: 22px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; }
        
        #search { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #333; background: #222; color: white; font-size: 16px; outline: none; }
        #search:focus { border-color: var(--accent); }

        /* Фільтри категорій */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .cat-chip { padding: 8px 18px; background: #222; border: 1px solid #444; border-radius: 4px; white-space: nowrap; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: 0.3s; color: #aaa; }
        .cat-chip.active { background: var(--accent); color: black; font-weight: bold; border-color: var(--accent); }

        /* Каталог */
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        @media (min-width: 768px) { .catalog { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; } }

        .card { background: var(--card-bg); border: 1px solid #222; border-radius: 4px; overflow: hidden; position: relative; transition: 0.3s; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; filter: grayscale(20%); }
        .card:active { transform: scale(0.98); }
        
        .card-info { padding: 12px; }
        .sku { font-size: 10px; color: var(--accent); margin-bottom: 5px; opacity: 0.8; }
        .card-info h3 { font-size: 13px; margin: 0; line-height: 1.3; height: 2.6em; overflow: hidden; color: #fff; font-weight: 400; }
        .price { font-size: 18px; font-weight: 900; color: var(--accent); margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }

        /* Модалка */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; overflow-y: auto; }
        .modal-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top:0; background: var(--bg); }
        .close-btn { color: var(--accent); border: none; background: none; font-size: 28px; }
        
        .modal-details { padding: 20px; }
        .main-img { width: 100%; border-radius: 4px; border: 1px solid #222; }
        .thumbs { display: flex; gap: 8px; overflow-x: auto; padding: 15px 0; }
        .thumb { width: 80px; height: 80px; border: 1px solid #333; object-fit: cover; }
        
        .order-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; padding: 15px; border-top: 1px solid var(--accent); display: flex; gap: 10px; box-sizing: border-box; }
        .btn { flex: 1; padding: 15px; border-radius: 4px; text-decoration: none; color: black; font-weight: 900; text-align: center; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Tactical / Elite</div>
    <input type="text" id="search" placeholder="ШУКАТИ СПОРЯДЖЕННЯ..." oninput="handleSearch()">
    <div class="cat-bar" id="filters"></div>
</header>

<div class="catalog" id="catalog"></div>
<button id="loadMore" style="display:none; width: 94%; margin: 20px auto; padding: 15px; background: #222; border: 1px solid var(--accent); color: var(--accent); font-weight: bold; text-transform: uppercase;" onclick="loadMore()">Показати ще</button>

<div id="modal">
    <div class="modal-header">
        <span id="modal-sku" style="color: var(--accent); font-size: 12px; letter-spacing: 1px;"></span>
        <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="modal-body"></div>
    <div class="order-bar" id="modal-footer"></div>
</div>

<script>
    let products = [];
    let filtered = [];
    let pageCount = 20;
    const CONFIG = { tg: "haosdead", wa: "380XXXXXXXXX" };

    async function init() {
        const res = await fetch('products.json');
        products = await res.json();
        filtered = products;

        // Основні категорії (фільтруємо унікальні назви)
        const rawCats = [...new Set(products.map(p => p.c))];
        const cats = ['Всі', ...rawCats.slice(0, 15)]; // Беремо перші 15 основних
        document.getElementById('filters').innerHTML = cats.map(c => 
            `<div class="cat-chip ${c==='Всі'?'active':''}" onclick="filterCat('${c}', this)">${c}</div>`).join('');
        
        render();
    }

    function render() {
        const container = document.getElementById('catalog');
        const show = filtered.slice(0, pageCount);
        
        container.innerHTML = show.map(p => `
            <div class="card" onclick="openModal(${products.indexOf(p)})">
                <img src="${p.i[0]}" loading="lazy">
                <div class="card-info">
                    <div class="sku">ART: ${p.v}</div>
                    <h3>${p.n}</h3>
                    <div class="price">
                        ${p.p} грн
                        <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.5;"></i>
                    </div>
                </div>
            </div>
        `).join('');
        document.getElementById('loadMore').style.display = pageCount < filtered.length ? 'block' : 'none';
    }

    function loadMore() { pageCount += 20; render(); }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        filtered = (cat === 'Всі') ? products : products.filter(p => p.c === cat);
        pageCount = 20;
        render();
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        filtered = products.filter(p => p.n.toLowerCase().includes(q) || String(p.v).includes(q));
        pageCount = 20;
        render();
    }

    function openModal(idx) {
        const p = products[idx];
        const msg = encodeURIComponent(`Замовлення ART: ${p.v}\nТовар: ${p.n}`);
        
        document.getElementById('modal-sku').innerText = `ARTICUL: ${p.v}`;
        document.getElementById('modal-body').innerHTML = `
            <div style="background: #000;"><img id="big-img" src="${p.i[0]}" class="main-img"></div>
            <div class="thumbs">${p.i.map(src => `<img src="${src}" class="thumb" onclick="document.getElementById('big-img').src='${src}'">`).join('')}</div>
            <div class="modal-details">
                <h2 style="font-size: 22px; margin: 0 0 10px 0; color: white;">${p.n}</h2>
                <div style="font-size: 26px; color: var(--accent); font-weight: 900; margin-bottom: 20px;">${p.p} грн</div>
                <div style="color: #888; line-height: 1.6; font-size: 15px;">${p.d}</div>
            </div>
        `;
        document.getElementById('modal-footer').innerHTML = `
            <a href="https://t.me/${CONFIG.tg}?text=${msg}" class="btn" style="background: var(--accent);"><i class="fab fa-telegram"></i> ЗАМОВИТИ TELEGRAM</a>
            <a href="https://wa.me/${CONFIG.wa}?text=${msg}" class="btn" style="background: #fff;"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
        `;
        
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>

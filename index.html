<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;800&display=swap');

        :root { --bg: #080808; --card: #121212; --accent: #ff6600; --text: #ffffff; --border: #222; }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Sidebar Navigation */
        #sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: #000; border-right: 2px solid var(--accent);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; padding: 30px 20px;
        }
        #sidebar.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1999; backdrop-filter: blur(4px); }

        .sidebar-header { font-family: 'Orbitron'; color: var(--accent); font-size: 18px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .cat-link { padding: 12px 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 14px; border: 1px solid transparent; }
        .cat-link:hover { border-color: var(--accent); color: var(--accent); }
        .cat-link.active { background: var(--accent); color: #000; font-weight: 800; }

        /* Header */
        header { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; background: rgba(8,8,8,0.9); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        .burger { font-size: 24px; color: var(--accent); cursor: pointer; }
        .logo { font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px; color: var(--accent); }

        /* Search */
        .search-container { padding: 15px; }
        #search { 
            width: 100%; padding: 14px 20px; border-radius: 18px; border: 1px solid var(--border);
            background: #111; color: #fff; font-size: 16px; outline: none; box-sizing: border-box;
        }
        #search:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,102,0,0.2); }

        /* Catalog Grid */
        .catalog { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        @media (min-width: 768px) { .catalog { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; } }

        .card { 
            background: var(--card); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; transition: 0.3s; position: relative;
        }
        .card:active { transform: scale(0.97); }
        .card img { width: 100%; aspect-ratio: 1/1.1; object-fit: cover; }
        .card-body { padding: 12px; }
        .art { font-size: 10px; color: var(--accent); font-weight: 800; margin-bottom: 4px; opacity: 0.7; }
        .title { font-size: 13px; font-weight: 500; height: 34px; overflow: hidden; line-height: 1.3; }
        .price { font-size: 18px; font-weight: 800; color: var(--accent); margin-top: 8px; }

        /* Modal View */
        #modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 3000; overflow-y: auto; }
        .m-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .m-content { padding: 20px; padding-bottom: 120px; }
        .m-img { width: 100%; border-radius: 25px; border: 1px solid var(--border); }
        .gallery { display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; }
        .gallery img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); flex-shrink: 0; }
        
        /* Bottom Bar */
        .bottom-bar { 
            position: fixed; bottom: 0; width: 100%; padding: 20px; 
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--border);
            display: flex; gap: 10px; box-sizing: border-box; z-index: 3001;
        }
        .order-btn { 
            flex: 1; padding: 16px; border-radius: 16px; text-decoration: none; 
            text-align: center; font-weight: 800; font-size: 14px; color: #000;
        }

        .btn-load { display: block; width: 90%; margin: 20px auto; padding: 15px; background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" onclick="toggleMenu()"></div>
<div id="sidebar">
    <div class="sidebar-header">КАТЕГОРІЇ</div>
    <div id="filters"></div>
</div>

<header>
    <div class="burger" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></div>
    <div class="logo">TACTICAL ELITE</div>
    <div><i class="fa-solid fa-magnifying-glass" style="opacity: 0.5"></i></div>
</header>

<div class="search-container">
    <input type="text" id="search" placeholder="Пошук за назвою або ART..." oninput="handleSearch()">
</div>

<div class="catalog" id="catalog"></div>
<button id="loadMore" class="btn-load" onclick="loadMore()" style="display:none;">ЗАВАНТАЖИТИ ЩЕ</button>

<div id="modal">
    <div class="m-header">
        <span id="m-sku" style="font-family:'Orbitron'; color:var(--accent); font-size:12px;"></span>
        <i class="fa-solid fa-xmark" style="font-size:24px; color:var(--accent);" onclick="closeModal()"></i>
    </div>
    <div class="m-content">
        <img id="m-main-img" class="m-img" src="">
        <div id="m-gallery" class="gallery"></div>
        <div id="m-price" style="font-size:32px; font-weight:900; color:var(--accent); margin:15px 0;"></div>
        <h2 id="m-title" style="font-family:'Orbitron'; font-size:20px; margin-bottom:15px;"></h2>
        <div id="m-desc" style="color:#aaa; line-height:1.6; font-size:15px;"></div>
    </div>
    <div class="bottom-bar" id="m-footer"></div>
</div>

<script>
    let products = [];
    let filtered = [];
    let itemsShown = 20;
    const CONFIG = { tg: "haosdead", wa: "380XXXXXXXXX" }; // ЗАМІНІТЬ НА СВОЄ

    async function init() {
        try {
            const res = await fetch('products.json');
            products = await res.json();
            filtered = products;

            const cats = ['Всі', ...new Set(products.map(p => p.c))];
            document.getElementById('filters').innerHTML = cats.map(c => 
                `<div class="cat-link" onclick="filterCat('${c}', this)">${c}</div>`).join('');
            
            render();
        } catch (e) {
            document.getElementById('catalog').innerHTML = "<div style='grid-column:1/-1; text-align:center; padding:50px;'>Запустіть Auto Update в GitHub Actions...</div>";
        }
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        const overlay = document.querySelector('.overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function render() {
        const container = document.getElementById('catalog');
        const chunk = filtered.slice(0, itemsShown);
        container.innerHTML = chunk.map(p => `
            <div class="card" onclick="openModal(${products.indexOf(p)})">
                <img src="${p.i[0]}" loading="lazy">
                <div class="card-body">
                    <div class="art">ART: ${p.v}</div>
                    <div class="title">${p.n}</div>
                    <div class="price">${p.p} грн</div>
                </div>
            </div>
        `).join('');
        document.getElementById('loadMore').style.display = itemsShown < filtered.length ? 'block' : 'none';
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        filtered = (cat === 'Всі') ? products : products.filter(p => p.c === cat);
        itemsShown = 20;
        render();
        toggleMenu();
        window.scrollTo(0,0);
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        filtered = products.filter(p => p.n.toLowerCase().includes(q) || String(p.v).includes(q));
        itemsShown = 20;
        render();
    }

    function loadMore() { itemsShown += 20; render(); }

    function openModal(idx) {
        const p = products[idx];
        const msg = encodeURIComponent(`Замовлення ART: ${p.v}\nТовар: ${p.n}`);
        
        document.getElementById('m-sku').innerText = `ART: ${p.v}`;
        document.getElementById('m-main-img').src = p.i[0];
        document.getElementById('m-title').innerText = p.n;
        document.getElementById('m-price').innerText = p.p + ' грн';
        document.getElementById('m-desc').innerHTML = p.d;
        
        document.getElementById('m-gallery').innerHTML = p.i.map(src => `
            <img src="${src}" onclick="document.getElementById('m-main-img').src='${src}'">
        `).join('');

        document.getElementById('m-footer').innerHTML = `
            <a href="https://t.me/${CONFIG.tg}?text=${msg}" class="order-btn" style="background:var(--accent)">ЗАМОВИТИ В TELEGRAM</a>
            <a href="https://wa.me/${CONFIG.wa}?text=${msg}" class="order-btn" style="background:#fff">WHATSAPP</a>
        `;
        
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>

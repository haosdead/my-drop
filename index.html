<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #1a1a1a; --accent: #27ae60; --bg: #fdfdfd; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; color: #333; }

        /* Шапка для телефону */
        header { position: sticky; top: 0; background: white; z-index: 100; border-bottom: 1px solid #eee; padding: 10px 15px; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; }
        
        .search-box { position: relative; }
        #search { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #eee; background: #f5f5f5; box-sizing: border-box; font-size: 16px; outline: none; }

        /* Категорії (горизонтальні на моб) */
        .cat-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cat-bar::-webkit-scrollbar { display: none; }
        .cat-chip { padding: 8px 16px; background: white; border: 1px solid #eee; border-radius: 20px; white-space: nowrap; font-size: 14px; font-weight: 500; }
        .cat-chip.active { background: var(--main); color: white; border-color: var(--main); }

        /* Сітка товарів (2 в ряд для моб) */
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .catalog { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 20px; } }

        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; background: #f9f9f9; }
        .card-info { padding: 10px; flex-grow: 1; }
        .card-info h3 { font-size: 13px; margin: 0; line-height: 1.3; height: 2.6em; overflow: hidden; font-weight: 500; color: #444; }
        .price { font-size: 16px; font-weight: 800; color: #000; margin-top: 8px; }

        /* Модалка (на весь екран моб) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .close-btn { border: none; background: none; font-size: 24px; padding: 5px; }
        
        .modal-content { padding: 0 0 100px 0; }
        .main-img-wrap { width: 100%; position: relative; }
        .main-img-wrap img { width: 100%; object-fit: contain; max-height: 70vh; }
        
        .thumbs { display: flex; gap: 10px; overflow-x: auto; padding: 15px; }
        .thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 2px solid #eee; flex-shrink: 0; }
        .thumb.active { border-color: var(--main); }

        .details { padding: 20px; }
        .details h2 { font-size: 20px; margin: 0 0 10px 0; }
        .details .price-big { font-size: 24px; font-weight: 900; color: var(--accent); margin-bottom: 15px; }
        .details .desc { font-size: 15px; line-height: 1.6; color: #666; }

        /* Нижня панель замовлення */
        .order-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); display: flex; gap: 10px; box-sizing: border-box; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; text-decoration: none; color: white; font-weight: 700; text-align: center; font-size: 15px; }
        
        /* Кнопка "Показати ще" */
        .load-more { display: block; width: calc(100% - 20px); margin: 10px; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="logo">MILITARY STORE</div>
    </div>
    <div class="search-box">
        <input type="text" id="search" placeholder="Пошук товарів..." oninput="handleSearch()">
    </div>
    <div class="cat-bar" id="filters"></div>
</header>

<div class="catalog" id="catalog"></div>
<button id="loadMore" class="load-more" onclick="loadMore()" style="display:none;">Показати ще</button>

<div id="modal">
    <div class="modal-header">
        <span id="modal-cat-name" style="font-size:12px; color:#999; font-weight:bold;">КАТЕГОРІЯ</span>
        <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-content" id="modal-body"></div>
    <div class="order-bar" id="modal-footer"></div>
</div>

<script>
    let products = [];
    let filtered = [];
    let pageCount = 20;
    const CONFIG = { tg: "haosdead", wa: "380XXXXXXXXX" };

    async function init() {
        const res = await fetch('products.json');
        products = await res.json();
        filtered = products;

        // Генерація категорій
        const rawCats = [...new Set(products.map(p => p.c))];
        const cats = ['Всі', ...rawCats];
        document.getElementById('filters').innerHTML = cats.map(c => 
            `<div class="cat-chip ${c==='Всі'?'active':''}" onclick="filterCat('${c}', this)">${c}</div>`).join('');
        
        render();
    }

    function render() {
        const container = document.getElementById('catalog');
        const show = filtered.slice(0, pageCount);
        
        container.innerHTML = show.map((p, idx) => `
            <div class="card" onclick="openModal(${products.indexOf(p)})">
                <img src="${p.i[0]}" loading="lazy">
                <div class="card-info">
                    <h3>${p.n}</h3>
                    <div class="price">${p.p} грн</div>
                </div>
            </div>
        `).join('');

        document.getElementById('loadMore').style.display = pageCount < filtered.length ? 'block' : 'none';
    }

    function loadMore() {
        pageCount += 20;
        render();
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        filtered = (cat === 'Всі') ? products : products.filter(p => p.c === cat);
        pageCount = 20;
        render();
    }

    function handleSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        filtered = products.filter(p => p.n.toLowerCase().includes(q));
        pageCount = 20;
        render();
    }

    function openModal(idx) {
        const p = products[idx];
        const msg = encodeURIComponent(`Замовлення: ${p.n}`);
        
        document.getElementById('modal-cat-name').innerText = p.c.toUpperCase();
        document.getElementById('modal-body').innerHTML = `
            <div class="main-img-wrap"><img id="big-img" src="${p.i[0]}"></div>
            <div class="thumbs">${p.i.map(src => `<img src="${src}" class="thumb" onclick="document.getElementById('big-img').src='${src}'">`).join('')}</div>
            <div class="details">
                <div class="price-big">${p.p} грн</div>
                <h2>${p.n}</h2>
                <div class="desc">${p.d}</div>
            </div>
        `;
        document.getElementById('modal-footer').innerHTML = `
            <a href="https://t.me/${CONFIG.tg}?text=${msg}" class="btn" style="background:#0088cc"><i class="fab fa-telegram"></i> Telegram</a>
            <a href="https://wa.me/${CONFIG.wa}?text=${msg}" class="btn" style="background:#25d366"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        `;
        
        document.getElementById('modal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    init();
</script>
</body>
</html>
